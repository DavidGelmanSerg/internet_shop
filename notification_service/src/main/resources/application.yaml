spring:
  application:
    name: notification-service
  mail:
    host: smtp.gmail.com
    port: 587
    username: davidgelman.univer@gmail.com
    password: isau lxra qfzt dvte
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  config:
    encoding: UTF-8
  kafka:
    bootstrap-servers: "localhost:41304"
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      group-id: "notification_consumers"
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
        spring.json.trusted.packages: "ru.gelman.notification_service.events"
        # orders-service publishes its own DTOs under a different package/class name;
        # these tokens (shared with orders-service's producer config) let us resolve
        # them to our own event classes instead of needing orders-service's classes
        # on this service's classpath.
        spring.json.type.mapping: "orderCreated:ru.gelman.notification_service.events.OrderCreatedEvent,orderStatusChanged:ru.gelman.notification_service.events.OrderChangeStatusEvent"

server:
  port: 41302

app:
  services:
    users:
      url: ${APP_SERVICES_USERS_URL:http://localhost}
      username: ${APP_SERVICES_USERS_USERNAME:admin@example.com}
      password: ${APP_SERVICES_USERS_PASSWORD:password}