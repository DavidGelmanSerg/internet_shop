spring:
  application:
    name: orders-service
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/orders_database
    username: postgres
    password: admin
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  kafka:
    bootstrap-servers: "localhost:41304"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        # Maps our local DTOs to tokens shared with notification-service's own
        # (differently-named/packaged) event classes, since JacksonJsonDeserializer
        # resolves types by class name and the consumer can't load our classes.
        spring.json.type.mapping: "orderCreated:ru.gelman.orders_service.dto.KafkaOrderCreatedEvent,orderStatusChanged:ru.gelman.orders_service.dto.KafkaOrderStatusChangedEvent"
server:
  port: 8080
app:
  kafka:
    orders:
      topic: order-event-topic